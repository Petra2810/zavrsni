<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LibraMarket | Knjižna tržnica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.css" rel="stylesheet" type="text/css" />
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"
            }
        }
    </script>
    <style>
        .card-hover:hover { transform: translateY(-4px); transition: all 0.2s ease; }
        .toast-notify { position: fixed; bottom: 20px; right: 20px; z-index: 999; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .cart-badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border-radius: 999px; font-size: 10px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .cart-btn-relative { position: relative; }
        /* dodatni stilovi za novi navbar - Flowbite inspiriran ali prilagođen */
        .bg-neutral-primary { background-color: #ffffff; }
        .border-default { border-color: #e5e7eb; }
        .text-heading { color: #111827; }
        .text-body { color: #4b5563; }
        .bg-neutral-secondary-soft { background-color: #f9fafb; }
        .hover\:bg-neutral-tertiary:hover { background-color: #f3f4f6; }
        .text-fg-brand { color: #3b82f6; }
        .bg-brand { background-color: #3b82f6; }
        .rounded-base { border-radius: 0.5rem; }
    </style>
</head>
<body class="font-sans antialiased bg-gray-50">

    <!-- NOVI NAVBAR - Flowbite stil, prilagođen za LibraMarket -->
    <nav class="bg-white fixed w-full z-20 top-0 start-0 border-b border-gray-200 shadow-sm">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="#" class="flex items-center space-x-3 rtl:space-x-reverse">
                <span class="self-center text-2xl font-bold text-gray-800 whitespace-nowrap">📚 LibraMarket</span>
            </a>
            <!-- Mobile menu button -->
            <button data-collapse-toggle="navbar-default" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200" aria-controls="navbar-default" aria-expanded="false">
                <span class="sr-only">Open main menu</span>
                <svg class="w-6 h-6" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14"/></svg>
            </button>
            <div class="hidden w-full md:block md:w-auto" id="navbar-default">
                <ul class="font-medium flex flex-col p-4 md:p-0 mt-4 border border-gray-100 rounded-lg bg-gray-50 md:flex-row md:space-x-8 md:mt-0 md:border-0 md:bg-white">
                    <li>
                        <a href="#" class="block py-2 px-3 text-white bg-blue-600 rounded md:bg-transparent md:text-blue-600 md:p-0" aria-current="page">Knjige</a>
                    </li>
                    <!-- Samo jedna pod-stranica (Knjige) - ostalo maknuto -->
                </ul>
            </div>
            <!-- Desna sekcija: košarica i auth -->
            <div class="flex items-center gap-4">
                <button id="cartIconBtn" class="relative flex items-center gap-1 text-gray-700 hover:text-blue-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z" />
                    </svg>
                    <span id="cartCountBadge" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
                </button>
                <div id="auth-section" class="flex gap-2 items-center">
                    <div id="userInfoPlaceholder" class="text-sm font-medium text-gray-600 hidden md:block"></div>
                    <button id="loginBtn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition">Prijava</button>
                    <button id="logoutBtn" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition hidden">Odjava</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Glavni sadržaj s padding-top za fiksni navbar -->
    <div id="app" class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 mt-20">
        
        <div id="toastContainer" class="toast-notify"></div>

        <!-- PRIJAVA MODAL -->
        <dialog id="authModal" class="modal">
            <div class="modal-box">
                <h3 class="font-bold text-lg mb-4">Prijava / Registracija</h3>
                <input type="email" id="loginEmail" placeholder="Email" class="input input-bordered w-full mb-3" />
                <input type="password" id="loginPassword" placeholder="Lozinka (min 6 znakova)" class="input input-bordered w-full mb-4" />
                <div class="flex flex-wrap gap-2">
                    <button id="modalLoginAction" class="btn btn-primary flex-1">Prijavi se</button>
                    <button id="modalRegisterAction" class="btn btn-secondary flex-1">Registriraj se</button>
                    <button id="closeModalBtn" class="btn btn-ghost">Zatvori</button>
                </div>
                <div id="authErrorMsg" class="text-error text-sm mt-2 hidden"></div>
            </div>
        </dialog>

        <!-- KOŠARICA MODAL -->
        <dialog id="cartModal" class="modal">
            <div class="modal-box max-w-lg">
                <h3 class="font-bold text-lg mb-3">🛒 Moja košarica</h3>
                <div id="cartItemsList" class="max-h-80 overflow-y-auto border rounded-lg p-2 bg-gray-50"></div>
                <div class="mt-4 flex justify-between items-center">
                    <span class="font-bold">Ukupno: <span id="cartTotalPrice">0.00</span> €</span>
                    <div class="flex gap-2">
                        <button id="clearCartBtn" class="btn btn-sm btn-error">Isprazni</button>
                        <button id="checkoutCartBtn" class="btn btn-sm btn-success">Nastavi na kupnju</button>
                    </div>
                </div>
                <div class="modal-action">
                    <button id="closeCartModalBtn" class="btn btn-sm">Zatvori</button>
                </div>
            </div>
        </dialog>

        <!-- DODAVANJE KNJIGE (samo prijavljeni) -->
        <div id="addBookPanel" class="bg-white rounded-xl shadow-md p-5 mb-8 hidden border border-gray-200">
            <h2 class="text-xl font-semibold mb-3 flex items-center gap-2">📖 Prodaj svoju knjigu</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="bookTitle" placeholder="Naslov knjige *" class="input input-bordered w-full" />
                <input type="text" id="bookAuthor" placeholder="Autor *" class="input input-bordered w-full" />
                <input type="number" id="bookPrice" placeholder="Cijena (€) *" class="input input-bordered w-full" step="0.01" />
                <input type="text" id="bookImage" placeholder="URL slike (opcionalno)" class="input input-bordered w-full" />
                <textarea id="bookDesc" placeholder="Opis knjige..." class="textarea textarea-bordered md:col-span-2" rows="2"></textarea>
            </div>
            <div class="mt-4 flex justify-end">
                <button id="submitBookBtn" class="btn btn-success">Objavi knjigu za prodaju</button>
            </div>
        </div>

        <!-- FILTER I SORTIRANJE -->
        <div class="flex flex-wrap gap-3 justify-between items-center my-6 bg-white p-3 rounded-lg shadow-sm">
            <div class="flex gap-2 items-center">
                <span class="text-sm font-medium">🔍 Pretraži:</span>
                <input type="text" id="searchInput" placeholder="Naslov ili autor" class="input input-bordered input-sm w-48" />
            </div>
            <div class="flex gap-2 items-center">
                <span class="text-sm font-medium">Sortiraj:</span>
                <select id="sortSelect" class="select select-bordered select-sm">
                    <option value="default">Zadano</option>
                    <option value="price_asc">Cijena rastuće</option>
                    <option value="price_desc">Cijena padajuće</option>
                </select>
            </div>
        </div>

        <!-- GRID KNJIGA -->
        <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-12">Učitavanje knjiga... <div class="loading-spinner ml-2"></div></div>
        </div>

        <!-- MODAL ZA RECENZIJE -->
        <dialog id="reviewModal" class="modal">
            <div class="modal-box max-w-lg">
                <h3 id="reviewModalTitle" class="font-bold text-lg">Recenzije za knjigu</h3>
                <div id="reviewsList" class="mt-3 max-h-60 overflow-y-auto border rounded p-2 bg-gray-50"></div>
                <div class="mt-4" id="addReviewSection">
                    <textarea id="newReviewText" rows="2" placeholder="Napiši svoju recenziju..." class="textarea textarea-bordered w-full"></textarea>
                    <div class="flex flex-wrap justify-between items-center mt-2 gap-2">
                        <div class="rating rating-sm" id="ratingStars">
                            <input type="radio" name="rating" value="1" class="mask mask-star-2 bg-orange-400" />
                            <input type="radio" name="rating" value="2" class="mask mask-star-2 bg-orange-400" />
                            <input type="radio" name="rating" value="3" class="mask mask-star-2 bg-orange-400" />
                            <input type="radio" name="rating" value="4" class="mask mask-star-2 bg-orange-400" />
                            <input type="radio" name="rating" value="5" class="mask mask-star-2 bg-orange-400" checked />
                        </div>
                        <button id="submitReviewBtn" class="btn btn-primary btn-sm">Dodaj recenziju</button>
                    </div>
                </div>
                <div class="modal-action">
                    <button id="closeReviewModal" class="btn">Zatvori</button>
                </div>
            </div>
        </dialog>
    </div>

    <script type="module">
        // Firebase konfiguracija
        const firebaseConfig = {
            apiKey: "AIzaSyCO7QLZsCxQeY6uHYbtaByg2exqtfCM0G0",
            authDomain: "zavrsnipetradaniela.firebaseapp.com",
            databaseURL: "https://zavrsnipetradaniela-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "zavrsnipetradaniela",
            storageBucket: "zavrsnipetradaniela.firebasestorage.app",
            messagingSenderId: "1016932466553",
            appId: "1:1016932466553:web:994b6d55d4d04efa8939a8"
        };
        
        import { initializeApp } from "firebase/app";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "firebase/auth";
        import { getDatabase, ref, set, get, push, onValue, remove } from "firebase/database";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        // DOM elementi
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const authModal = document.getElementById('authModal');
        const modalLoginAction = document.getElementById('modalLoginAction');
        const modalRegisterAction = document.getElementById('modalRegisterAction');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const userInfoPlaceholder = document.getElementById('userInfoPlaceholder');
        const addBookPanel = document.getElementById('addBookPanel');
        const submitBookBtn = document.getElementById('submitBookBtn');
        const booksGrid = document.getElementById('booksGrid');
        const searchInput = document.getElementById('searchInput');
        const sortSelect = document.getElementById('sortSelect');
        const reviewModal = document.getElementById('reviewModal');
        const reviewsListDiv = document.getElementById('reviewsList');
        const submitReviewBtn = document.getElementById('submitReviewBtn');
        const newReviewText = document.getElementById('newReviewText');
        const closeReviewModal = document.getElementById('closeReviewModal');
        const authErrorMsg = document.getElementById('authErrorMsg');
        const cartIconBtn = document.getElementById('cartIconBtn');
        const cartModal = document.getElementById('cartModal');
        const cartItemsList = document.getElementById('cartItemsList');
        const cartTotalPriceSpan = document.getElementById('cartTotalPrice');
        const clearCartBtn = document.getElementById('clearCartBtn');
        const checkoutCartBtn = document.getElementById('checkoutCartBtn');
        const closeCartModalBtn = document.getElementById('closeCartModalBtn');
        const cartCountBadge = document.getElementById('cartCountBadge');
        
        let currentUser = null;
        let currentBookId = null;
        let allBooks = [];
        
        let cartItems = [];
        
        function updateCartUI() {
            const count = cartItems.length;
            cartCountBadge.innerText = count;
            if (count > 0) {
                cartCountBadge.classList.add('bg-red-500', 'text-white', 'rounded-full', 'h-5', 'w-5', 'flex', 'items-center', 'justify-center', 'text-xs');
            } else {
                cartCountBadge.innerText = '0';
            }
            renderCartModal();
        }
        
        function renderCartModal() {
            if (!cartItemsList) return;
            if (cartItems.length === 0) {
                cartItemsList.innerHTML = '<div class="text-center py-6 text-gray-500">Košarica je prazna. Dodajte knjige koje vas zanimaju!</div>';
                cartTotalPriceSpan.innerText = '0.00';
                return;
            }
            let total = 0;
            const html = cartItems.map((item, idx) => {
                total += item.price;
                return `
                    <div class="flex justify-between items-center border-b py-2">
                        <div class="flex-1">
                            <p class="font-semibold text-sm">${escapeHtml(item.title)}</p>
                            <p class="text-xs text-gray-500">${item.price} €</p>
                        </div>
                        <button class="btn btn-xs btn-outline btn-error remove-cart-item" data-index="${idx}">🗑️ Ukloni</button>
                    </div>
                `;
            }).join('');
            cartItemsList.innerHTML = html;
            cartTotalPriceSpan.innerText = total.toFixed(2);
            document.querySelectorAll('.remove-cart-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    if (!isNaN(idx)) {
                        cartItems.splice(idx, 1);
                        updateCartUI();
                        showToast("Knjiga uklonjena iz košarice", "success");
                    }
                });
            });
        }
        
        function addToCart(book) {
            if (!currentUser) {
                showToast("Morate se prijaviti za korištenje košarice!", "error");
                return false;
            }
            if (cartItems.some(item => item.id === book.id)) {
                showToast("Ova knjiga je već u košarici!", "warning");
                return false;
            }
            cartItems.push({
                id: book.id,
                title: book.title,
                price: book.price,
                image: book.imageUrl || '',
                sellerEmail: book.sellerEmail
            });
            updateCartUI();
            showToast(`📚 "${book.title}" dodana u košaricu`, "success");
            return true;
        }
        
        function clearCart() {
            cartItems = [];
            updateCartUI();
            showToast("Košarica ispražnjena", "info");
        }
        
        function checkoutCart() {
            if (!currentUser) {
                showToast("Prijavite se za završetak kupnje", "error");
                return;
            }
            if (cartItems.length === 0) {
                showToast("Košarica je prazna, dodajte knjige", "error");
                return;
            }
            const ukupno = cartItems.reduce((sum, i) => sum + i.price, 0).toFixed(2);
            const naslovi = cartItems.map(i => i.title).join(', ');
            showToast(`Hvala na kupnji! Kupljene knjige: ${naslovi}. Ukupno: ${ukupno} €. Prodavači će vas kontaktirati.`, "success");
            cartItems = [];
            updateCartUI();
            cartModal.close();
        }
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = `alert alert-${type === 'error' ? 'error' : type === 'warning' ? 'warning' : 'success'} shadow-lg mb-2`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }
        
        function renderStaticStars(rating) {
            let stars = '';
            const fullStars = Math.floor(rating);
            for(let i = 1; i <= 5; i++) {
                stars += `<input type="radio" name="rating-static" disabled ${i <= fullStars ? 'checked' : ''} class="mask mask-star-2 bg-orange-400" />`;
            }
            return stars;
        }
        
        function loadBooks() {
            const booksRef = ref(db, 'books');
            onValue(booksRef, (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    allBooks = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));
                } else {
                    allBooks = [];
                }
                renderBooks();
            }, (error) => {
                console.error("Greška:", error);
                showToast("Greška pri učitavanju knjiga: " + error.message, "error");
            });
        }
        
        async function deleteBook(bookId, sellerId) {
            if (!currentUser) return false;
            if (currentUser.uid !== sellerId) {
                showToast("Možete obrisati samo vlastite knjige!", "error");
                return false;
            }
            if (confirm("Jeste li sigurni da želite trajno obrisati ovu knjigu?")) {
                try {
                    await remove(ref(db, `books/${bookId}`));
                    showToast("Knjiga uspješno obrisana.", "success");
                    return true;
                } catch (err) {
                    showToast("Greška pri brisanju: " + err.message, "error");
                    return false;
                }
            }
            return false;
        }
        
        function renderBooks() {
            let filtered = [...allBooks];
            const searchTerm = searchInput.value.toLowerCase();
            if(searchTerm) {
                filtered = filtered.filter(book => 
                    book.title?.toLowerCase().includes(searchTerm) || 
                    book.author?.toLowerCase().includes(searchTerm)
                );
            }
            
            const sortVal = sortSelect.value;
            if(sortVal === 'price_asc') filtered.sort((a,b) => (a.price||0) - (b.price||0));
            if(sortVal === 'price_desc') filtered.sort((a,b) => (b.price||0) - (a.price||0));
            
            if(filtered.length === 0) {
                booksGrid.innerHTML = `<div class="col-span-full text-center py-12 bg-white rounded-xl shadow">📭 Trenutno nema knjiga. Budi prvi koji će prodati knjigu!</div>`;
                return;
            }
            
            booksGrid.innerHTML = filtered.map(book => {
                const reviews = book.reviews ? Object.values(book.reviews) : [];
                const avgRating = reviews.length > 0 ? (reviews.reduce((sum, r) => sum + (r.rating||0), 0) / reviews.length).toFixed(1) : 'Nema';
                const reviewCount = reviews.length;
                const isOwner = currentUser && book.sellerId === currentUser.uid;
                return `
                    <div class="card card-compact bg-white shadow-lg rounded-xl overflow-hidden transition-all card-hover border border-gray-200 relative">
                        <figure class="h-48 bg-gray-100">
                            <img src="${book.imageUrl || 'https://placehold.co/400x300?text=Book+Cover'}" alt="${escapeHtml(book.title)}" class="object-cover w-full h-full" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
                        </figure>
                        <div class="card-body">
                            <h2 class="card-title text-lg font-bold">${escapeHtml(book.title)}</h2>
                            <p class="text-sm text-gray-500">Autor: ${escapeHtml(book.author)}</p>
                            <p class="text-md font-semibold text-primary">💰 ${book.price} €</p>
                            <p class="text-sm text-gray-600">${escapeHtml((book.description || 'Opis nije dostupan').substring(0,80))}</p>
                            <div class="flex justify-between items-center mt-2 flex-wrap gap-2">
                                <div class="flex items-center gap-1 text-sm">
                                    <div class="rating rating-xs">${avgRating !== 'Nema' ? renderStaticStars(parseFloat(avgRating)) : '⭐ Nema ocjena'}</div>
                                    <span>(${reviewCount})</span>
                                </div>
                                <div class="flex gap-1">
                                    <button class="btn btn-xs btn-outline btn-info review-btn" data-id="${book.id}">📝 Recenzije</button>
                                    <button class="btn btn-xs btn-outline btn-primary cart-add-btn" data-id="${book.id}" data-title="${escapeHtml(book.title)}" data-price="${book.price}" data-image="${book.imageUrl || ''}" data-seller="${escapeHtml(book.sellerEmail || '')}">🛒 Dodaj u košaricu</button>
                                    ${isOwner ? `<button class="btn btn-xs btn-outline btn-error delete-book-btn" data-id="${book.id}" data-sellerid="${book.sellerId}">🗑️ Obriši</button>` : ''}
                                </div>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">Prodavač: ${escapeHtml(book.sellerEmail || 'anonimno')}</p>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('.review-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.getAttribute('data-id');
                    openReviewModal(id);
                });
            });
            
            document.querySelectorAll('.cart-add-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if(!currentUser) { showToast("Prijavite se za dodavanje u košaricu", "error"); return; }
                    const id = btn.getAttribute('data-id');
                    const book = allBooks.find(b => b.id === id);
                    if(book) {
                        addToCart({ id: book.id, title: book.title, price: book.price, imageUrl: book.imageUrl, sellerEmail: book.sellerEmail });
                    }
                });
            });
            
            document.querySelectorAll('.delete-book-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const bookId = btn.getAttribute('data-id');
                    const sellerId = btn.getAttribute('data-sellerid');
                    if(bookId && sellerId) {
                        await deleteBook(bookId, sellerId);
                    } else {
                        showToast("Neispravni podaci knjige", "error");
                    }
                });
            });
        }
        
        async function openReviewModal(bookId) {
            currentBookId = bookId;
            const bookRef = ref(db, `books/${bookId}`);
            const snapshot = await get(bookRef);
            const book = snapshot.val();
            if(!book) return;
            
            document.getElementById('reviewModalTitle').innerHTML = `Recenzije za: ${escapeHtml(book.title)}`;
            const reviews = book.reviews ? Object.values(book.reviews) : [];
            
            if(reviews.length === 0) {
                reviewsListDiv.innerHTML = '<p class="text-gray-500 italic">Još nema recenzija, budi prvi!</p>';
            } else {
                reviewsListDiv.innerHTML = reviews.map(rev => `
                    <div class="border-b py-2">
                        <div class="flex items-center gap-2">
                            <div class="rating rating-xs">${renderStaticStars(rev.rating)}</div>
                            <span class="text-xs font-semibold">${escapeHtml(rev.userEmail)}</span>
                            <span class="text-xs text-gray-400">${new Date(rev.timestamp).toLocaleDateString()}</span>
                        </div>
                        <p class="text-sm mt-1">${escapeHtml(rev.text)}</p>
                    </div>
                `).join('');
            }
            
            const addReviewSection = document.getElementById('addReviewSection');
            if(currentUser) {
                addReviewSection.style.display = 'block';
            } else {
                addReviewSection.style.display = 'none';
            }
            reviewModal.showModal();
        }
        
        async function addNewBook() {
            if(!currentUser) { 
                showToast("Morate se prijaviti za prodaju!", "error"); 
                return; 
            }
            
            const title = document.getElementById('bookTitle').value.trim();
            const author = document.getElementById('bookAuthor').value.trim();
            const price = parseFloat(document.getElementById('bookPrice').value);
            const imageUrl = document.getElementById('bookImage').value.trim();
            const description = document.getElementById('bookDesc').value.trim();
            
            if(!title || !author || isNaN(price) || price <= 0) {
                showToast("Molimo ispunite naslov, autora i cijenu (>0)", "error");
                return;
            }
            
            try {
                const newBookRef = push(ref(db, 'books'));
                await set(newBookRef, {
                    title: title,
                    author: author,
                    price: price,
                    imageUrl: imageUrl || null,
                    description: description || "Bez opisa",
                    sellerEmail: currentUser.email,
                    sellerId: currentUser.uid,
                    createdAt: Date.now()
                });
                showToast("Knjiga uspješno dodana u prodaju!");
                document.getElementById('bookTitle').value = '';
                document.getElementById('bookAuthor').value = '';
                document.getElementById('bookPrice').value = '';
                document.getElementById('bookImage').value = '';
                document.getElementById('bookDesc').value = '';
            } catch(e) {
                console.error("Greška:", e);
                showToast("❌ Greška: " + e.message, "error");
            }
        }
        
        async function addReview() {
            if(!currentUser) { 
                showToast("Prijavite se za ostavljanje recenzije", "error"); 
                return; 
            }
            if(!currentBookId) return;
            
            const reviewText = newReviewText.value.trim();
            if(!reviewText) { 
                showToast("Napišite recenziju", "error"); 
                return; 
            }
            
            let selectedRating = 5;
            const radioSelected = document.querySelector('input[name="rating"]:checked');
            if(radioSelected) selectedRating = parseInt(radioSelected.value);
            
            try {
                const reviewId = Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const reviewRef = ref(db, `books/${currentBookId}/reviews/${reviewId}`);
                await set(reviewRef, {
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    text: reviewText,
                    rating: selectedRating,
                    timestamp: Date.now()
                });
                showToast("Recenzija dodana!");
                newReviewText.value = '';
                const defaultRating = document.querySelector('input[name="rating"][value="5"]');
                if(defaultRating) defaultRating.checked = true;
                reviewModal.close();
            } catch(e) {
                console.error("Greška:", e);
                showToast("Greška: " + e.message, "error");
            }
        }
        
        async function handleLogin(email, password) {
            authErrorMsg.classList.add('hidden');
            try {
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                showToast(`👋 Dobrodošli, ${userCred.user.email}!`);
                authModal.close();
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
            } catch(error) {
                let errorMessage = "Greška: " + error.message;
                authErrorMsg.textContent = errorMessage;
                authErrorMsg.classList.remove('hidden');
                showToast(errorMessage, "error");
            }
        }
        
        async function handleRegister(email, password) {
            authErrorMsg.classList.add('hidden');
            if(password.length < 6) {
                const msg = "Lozinka mora imati najmanje 6 znakova!";
                authErrorMsg.textContent = msg;
                authErrorMsg.classList.remove('hidden');
                showToast(msg, "error");
                return;
            }
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                showToast(`Registracija uspješna! Dobrodošli, ${userCred.user.email}!`);
                authModal.close();
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
            } catch(error) {
                let errorMessage = "Greška: " + error.message;
                authErrorMsg.textContent = errorMessage;
                authErrorMsg.classList.remove('hidden');
                showToast(errorMessage, "error");
            }
        }
        
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if(user) {
                userInfoPlaceholder.innerHTML = `${user.email}`;
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                addBookPanel.classList.remove('hidden');
            } else {
                userInfoPlaceholder.innerHTML = '👤 Neprijavljen';
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                addBookPanel.classList.add('hidden');
                cartItems = [];
                updateCartUI();
            }
            renderBooks();
        });
        
        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
            showToast("Odjavljeni ste");
            cartItems = [];
            updateCartUI();
        });
        
        loginBtn.addEventListener('click', () => {
            authErrorMsg.classList.add('hidden');
            authModal.showModal();
        });
        
        closeModalBtn.addEventListener('click', () => authModal.close());
        
        modalLoginAction.addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            const pwd = document.getElementById('loginPassword').value;
            if(email && pwd) handleLogin(email, pwd);
            else showToast("Unesite email i lozinku", "error");
        });
