<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marketplace</title>

    <!-- Tailwind + DaisyUI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.css" rel="stylesheet"/>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Firebase import -->
    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"
        }
    }
    </script>
</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto p-6">

    <h1 class="text-3xl font-bold mb-4">📚 Student Marketplace</h1>

    <!-- AUTH -->
    <div class="mb-4">
        <span id="userInfo"></span>
        <button id="loginBtn" class="btn btn-primary btn-sm">Prijava</button>
        <button id="logoutBtn" class="btn btn-outline btn-sm hidden">Odjava</button>
    </div>

    <!-- ADD BOOK -->
    <div id="addBookPanel" class="hidden bg-white p-4 rounded shadow mb-6">
        <input id="bookTitle" placeholder="Naslov" class="input input-bordered w-full mb-2">
        <input id="bookAuthor" placeholder="Autor" class="input input-bordered w-full mb-2">
        <input id="bookPrice" placeholder="Cijena" type="number" class="input input-bordered w-full mb-2">
        <button id="submitBookBtn" class="btn btn-success">Dodaj knjigu</button>
    </div>

    <!-- BOOKS -->
    <div id="booksGrid"></div>

</div>

<script type="module" src="main.js"></script>
</body>
</html>
